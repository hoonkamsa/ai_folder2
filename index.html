    <!DOCTYPE html>
    <html lang="ko">
    <head>
        <meta charset="UTF-8" />
        <title>스마트 AI 비전 케어 시스템</title>
        <style>
        * { box-sizing: border-box; }
        body {
            font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
            text-align: center;
            background: linear-gradient(180deg, #faf8f5 0%, #f3efe8 100%);
            color: #2f2a24;
            margin: 0; padding: 40px 20px; min-height: 100vh;
        }
        h1 { margin-bottom: 15px; font-size: 2.2rem; font-weight: 700; letter-spacing: -1px; color: #3a332c; }
        .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 14px 32px; font-size: 17px; font-weight: 600;
            border: none; border-radius: 14px; background: #d97757; color: white;
            cursor: pointer; transition: all 0.25s ease;
            box-shadow: 0 10px 25px rgba(217,119,87,0.25);
        }
        button:hover { transform: translateY(-2px); background: #ca6b4b; box-shadow: 0 15px 35px rgba(217,119,87,0.35); }
        button:active { transform: translateY(0); }
        button:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }
        #save-btn { background: #2f855a; box-shadow: 0 10px 25px rgba(47,133,90,0.25); }
        #save-btn:hover:not(:disabled) { background: #276749; box-shadow: 0 15px 35px rgba(47,133,90,0.35); }
        #canvas { margin-top: 25px; border-radius: 24px; border: 1px solid #e7dfd4; background: black; box-shadow: 0 20px 50px rgba(0,0,0,0.12); }
        #status-text {
            margin-top: 25px; font-size: 1.8rem; font-weight: 700;
            padding: 18px 24px; display: inline-block;
            background: rgba(255,255,255,0.85); border-radius: 18px;
            backdrop-filter: blur(10px); box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        .good { color: #2f855a; }
        .warning { color: #d64545; animation: blink 0.8s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
        #label-container {
            width: 420px; max-width: 95%; margin: 20px auto 0;
            background: rgba(255,255,255,0.85); border: 1px solid #ece5dc;
            border-radius: 20px; padding: 14px;
            backdrop-filter: blur(12px); box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            font-size: 14px; color: #4a433b;
        }
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 20%, rgba(217,119,87,0.08), transparent 35%),
                        radial-gradient(circle at 80% 30%, rgba(255,210,170,0.12), transparent 35%);
            z-index: -1;
        }
        .main-card {
            max-width: 900px; margin: 0 auto; padding: 35px;
            background: rgba(255,255,255,0.7); border: 1px solid rgba(255,255,255,0.8);
            border-radius: 30px; backdrop-filter: blur(16px);
            box-shadow: 0 25px 60px rgba(0,0,0,0.07);
        }
        </style>
    </head>
    <body>
    <div class="main-card">
        <h1>스마트 AI 비전 케어 시스템</h1>
        <div class="btn-row">
            <button type="button" onclick="init()">Start</button>
            <button type="button" id="save-btn" onclick="saveBase()" disabled title="현재 거리를 가까운 것과 먼 것의 구분 기준으로 설정합니다">기준 거리 저장</button>
        </div>
        <div><canvas id="canvas"></canvas></div>
        <div id="status-text">시작 버튼을 눌러주세요</div>
        <div id="label-container">카메라 시작 후 적절한 거리에서 "기준 거리 저장"을 눌러주세요.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <script>
        const MODEL_URL = "./";
        const SCORE_THRESHOLD = 0.3;
        const SPEAK_COOLDOWN = 3000;
        const MODEL_CONFIDENCE = 0.7; // 네 모델 판단 임계값

        const statusEl = document.getElementById("status-text");
        const labelEl  = document.getElementById("label-container");

        let model, webcam, ctx;
        let baseDistance = null;
        let lastKeypoints = null;
        let lastSpeakTime = 0;

        function eyeDist(keypoints) {
            const L = keypoints[1];
            const R = keypoints[2];
            if (L.score < SCORE_THRESHOLD || R.score < SCORE_THRESHOLD) return null;
            const dx = L.position.x - R.position.x;
            const dy = L.position.y - R.position.y;
            return Math.sqrt(dx*dx + dy*dy);
        }

        async function init() {
            model = await tmPose.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");

            const size = 300;
            webcam = new tmPose.Webcam(size, size, true);
            await webcam.setup();
            await webcam.play();

            const canvas = document.getElementById("canvas");
            canvas.width = size;
            canvas.height = size;
            ctx = canvas.getContext("2d");

            document.getElementById("save-btn").disabled = false;
            statusEl.innerHTML = "인식 중... (모델 판단)";
            labelEl.innerHTML = "적절한 거리에서 '기준 거리 저장'을 누르면 더 정확해집니다.";

            requestAnimationFrame(loop);
        }

        async function loop() {
            webcam.update();

            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);

            if (pose) {
                lastKeypoints = pose.keypoints;

                if (baseDistance) {
                    // 기준 저장 후: 눈 간격으로 판단
                    const dist = eyeDist(pose.keypoints);
                    if (dist !== null) {
                        labelEl.innerHTML = `현재 눈 간격: ${dist.toFixed(1)}px &nbsp;|&nbsp; 기준: ${baseDistance.toFixed(1)}px`;
                        checkByDistance(dist);
                    } else {
                        labelEl.innerHTML = "얼굴 인식 불안정 — 카메라 정면을 봐주세요";
                    }
                } else {
                    // 기준 저장 전: 네 모델로 판단
                    const prediction = await model.predict(posenetOutput);
                    checkByModel(prediction);
                }

                ctx.drawImage(webcam.canvas, 0, 0);
                tmPose.drawKeypoints(pose.keypoints, SCORE_THRESHOLD, ctx);
                tmPose.drawSkeleton(pose.keypoints, SCORE_THRESHOLD, ctx);
            }

            requestAnimationFrame(loop);
        }

        function checkByModel(prediction) {
            const best = prediction.reduce((a, b) => a.probability > b.probability ? a : b);

            labelEl.innerHTML = prediction
                .map(p => `${p.className}: ${p.probability.toFixed(2)}`)
                .join(" &nbsp;|&nbsp; ");

            const isClose = best.className.includes("B") || best.className.toLowerCase().includes("close");

            if (isClose && best.probability >= MODEL_CONFIDENCE) {
                statusEl.innerHTML = "⚠ 화면과 가깝습니다. 뒤로 물러나세요!";
                statusEl.className = "warning";
                speakWarning();
            } else {
                statusEl.innerHTML = "✓ 적절한 거리입니다.";
                statusEl.className = "good";
            }
        }

        function checkByDistance(dist) {
            const ratio = dist / baseDistance;
            if (ratio > 1.15) {
                statusEl.innerHTML = "⚠ 화면과 가깝습니다. 뒤로 물러나세요!";
                statusEl.className = "warning";
                speakWarning();
            }  else {
                statusEl.innerHTML = "✓ 적절한 거리입니다.";
                statusEl.className = "good";
            }
        }

        function saveBase() {
            if (!lastKeypoints) {
                alert("아직 포즈가 인식되지 않았습니다. 잠시 후 다시 눌러주세요.");
                return;
            }
            const dist = eyeDist(lastKeypoints);
            if (dist === null) {
                alert("눈 인식 실패 — 카메라 정면을 봐주세요.");
                return;
            }
            baseDistance = dist;
            statusEl.innerHTML = `✓ 기준 저장됨 (${baseDistance.toFixed(1)}px)`;
            statusEl.className = "good";
        }

        function speakWarning() {
            const now = Date.now();
            if (now - lastSpeakTime < SPEAK_COOLDOWN) return;
            lastSpeakTime = now;
            const msg = new SpeechSynthesisUtterance("화면과 가깝습니다. 뒤로 물러나세요.");
            msg.lang = "ko-KR";
            speechSynthesis.speak(msg);
        }
    </script>
    </body>
    </html>

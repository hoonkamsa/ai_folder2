<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <title>Teachable Machine Pose Model</title>

    <style>
    * {
        box-sizing: border-box;
    }

    body {
        font-family: "Pretendard", "Noto Sans KR", Arial, sans-serif;
        text-align: center;

        background: linear-gradient(
            180deg,
            #faf8f5 0%,
            #f3efe8 100%
        );

        color: #2f2a24;

        margin: 0;
        padding: 40px 20px;
        min-height: 100vh;
    }

    h1 {
        margin-bottom: 15px;

        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -1px;

        color: #3a332c;
    }

    button {
        padding: 14px 32px;

        font-size: 17px;
        font-weight: 600;

        border: none;
        border-radius: 14px;

        background: #d97757;
        color: white;

        cursor: pointer;

        transition: all 0.25s ease;

        box-shadow:
            0 10px 25px rgba(217, 119, 87, 0.25);
    }

    button:hover {
        transform: translateY(-2px);

        background: #ca6b4b;

        box-shadow:
            0 15px 35px rgba(217, 119, 87, 0.35);
    }

    button:active {
        transform: translateY(0);
    }

    #canvas {
        margin-top: 25px;

        border-radius: 24px;
        border: 1px solid #e7dfd4;

        background: black;

        box-shadow:
            0 20px 50px rgba(0, 0, 0, 0.12);

        overflow: hidden;
    }

    #status-text {
        margin-top: 25px;

        font-size: 1.8rem;
        font-weight: 700;

        padding: 18px 24px;

        display: inline-block;

        background: rgba(255,255,255,0.85);

        border-radius: 18px;

        backdrop-filter: blur(10px);

        box-shadow:
            0 8px 25px rgba(0,0,0,0.06);
    }

    .good {
        color: #2f855a;
    }

    .warning {
        color: #d64545;
        animation: blink 0.8s infinite alternate;
    }

    @keyframes blink {
        from {
            opacity: 1;
        }
        to {
            opacity: 0.5;
        }
    }

    #label-container {
        width: 420px;
        max-width: 95%;

        margin: 30px auto 0;

        background: rgba(255,255,255,0.85);

        border: 1px solid #ece5dc;

        border-radius: 20px;

        padding: 18px;

        backdrop-filter: blur(12px);

        box-shadow:
            0 15px 35px rgba(0,0,0,0.05);
    }

    #label-container div {
        text-align: left;

        background: #f8f5ef;

        border-radius: 12px;

        padding: 10px 14px;

        margin-bottom: 8px;

        font-size: 15px;

        color: #4a433b;

        transition: all 0.2s ease;
    }

    #label-container div:hover {
        background: #f1ece4;
    }

    #label-container div:last-child {
        margin-bottom: 0;
    }

    /* Claude 느낌 카드 */

    body::before {
        content: "";

        position: fixed;

        top: 0;
        left: 0;

        width: 100%;
        height: 100%;

        background:
            radial-gradient(circle at 20% 20%,
                rgba(217,119,87,0.08),
                transparent 35%),
            radial-gradient(circle at 80% 30%,
                rgba(255,210,170,0.12),
                transparent 35%);

        z-index: -1;
    }

    .main-card {
        max-width: 900px;

        margin: 0 auto;

        padding: 35px;

        background: rgba(255,255,255,0.7);

        border: 1px solid rgba(255,255,255,0.8);

        border-radius: 30px;

        backdrop-filter: blur(16px);

        box-shadow:
            0 25px 60px rgba(0,0,0,0.07);
    }
    </style>
</head>

<body>

<div class="main-card">

    <h1>Teachable Machine Pose Model</h1>

    <button type="button" onclick="init()">Start</button>

    <div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="status-text">시작 버튼을 눌러주세요</div>

    <div id="label-container"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/NX5hCTCXM/";

    let model, webcam, ctx, labelContainer, maxPredictions;
    let isRunning = false;

    let lastSpeakTime = 0;
    const speakCooldown = 3000;
    const warningProbability = 0.70;

    async function init() {
        if (isRunning) return;
        isRunning = true;

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const size = 300;
        const flip = true;

        webcam = new tmPose.Webcam(size, size, flip);
        await webcam.setup();
        await webcam.play();

        window.requestAnimationFrame(loop);


        const canvas = document.getElementById("canvas");
        canvas.width = size;
        canvas.height = size;
        ctx = canvas.getContext("2d");

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("status-text").innerHTML = "인식 중...";
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        let bestPrediction = prediction[0];
        for (let i = 1; i < prediction.length; i++) {
            if (prediction[i].probability > bestPrediction.probability) {
                bestPrediction = prediction[i];
            }
        }

        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + prediction[i].probability.toFixed(2);
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        checkStatus(bestPrediction);
        drawPose(pose);
    }

    function checkStatus(bestPrediction) {
        const statusText = document.getElementById("status-text");

        const className = bestPrediction.className;
        const probability = bestPrediction.probability;

        const isGood =
            className.includes("A") ||
            className.includes("적절") ||
            className.includes("good") ||
            className.includes("Good");

        const isClose =
            className.includes("B") ||
            className.includes("가까") ||
            className.includes("close") ||
            className.includes("Close");

        if (isClose && probability >= warningProbability) {
            statusText.innerHTML = "⚠ 화면과 가깝습니다. 노트북과 멀어지세요!";
            statusText.className = "warning";
            speakWarning();
        } else if (isGood && probability >= warningProbability) {
            statusText.innerHTML = "적절한 자세입니다.";
            statusText.className = "good";
        } else {
            statusText.innerHTML = "자세를 인식하는 중입니다...";
            statusText.className = "";
        }
    }

    function speakWarning() {
        const now = Date.now();
        if (now - lastSpeakTime < speakCooldown) return;
        lastSpeakTime = now;

        const message = new SpeechSynthesisUtterance("화면과 가깝습니다. 노트북과 멀어지세요.");
        message.lang = "ko-KR";
        message.rate = 1;
        message.pitch = 1;

        window.speechSynthesis.speak(message);
    }

    function drawPose(pose) {
        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                const minPartConfidence = 0.5;
                tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
            }
        }
    }
</script>

</body>
</html>
